<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        .navbar {
            background: linear-gradient(to bottom, #5fb1ff, #d1e8ff);
            padding: 8px 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 0 0 12px 12px;
            position: relative;
        }

        .navbar-logo {
            display: flex;
            align-items: center;
            z-index: 1001;
        }

        .navbar-logo img {
            height: 32px;
            width: auto;
        }

        .navbar-links {
            display: flex;
            gap: 14px;
        }

        .navbar-link {
            text-decoration: none;
            font-weight: 500;
            color: #004080;
            padding: 8px 16px;
            border-radius: 999px;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }

        .navbar-link:hover,
        .navbar-link.active {
            background-color: #e6f2ff;
            color: #002f5c;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            padding: 8px;
            z-index: 1001;
            background: transparent;
            border: none;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background-color: #004080;
            margin: 3px 0;
            transition: all 0.3s ease;
            border-radius: 3px;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(8px, 8px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
            transform: translateX(-20px);
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(8px, -8px);
        }

        @media (max-width: 600px) {
            .hamburger {
                display: flex;
            }

            .navbar-links {
                position: fixed;
                top: 0;
                right: -100%;
                height: 100vh;
                width: 70%;
                max-width: 300px;
                background: linear-gradient(to bottom, #5fb1ff, #d1e8ff);
                flex-direction: column;
                padding: 80px 30px 30px;
                gap: 10px;
                box-shadow: -2px 0 10px rgba(0, 0, 0, 0.1);
                transition: right 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
                z-index: 1000;
            }

            .navbar-links.active {
                right: 0;
            }

            .navbar-link {
                padding: 12px 20px;
                width: 100%;
                text-align: left;
                opacity: 0;
                transform: translateX(20px);
                animation: slideIn 0.3s ease forwards;
            }

            .navbar-links.active .navbar-link:nth-child(1) {
                animation-delay: 0.1s;
            }

            .navbar-links.active .navbar-link:nth-child(2) {
                animation-delay: 0.15s;
            }

            .navbar-links.active .navbar-link:nth-child(3) {
                animation-delay: 0.2s;
            }

            .navbar-links.active .navbar-link:nth-child(4) {
                animation-delay: 0.25s;
            }

            .navbar-links.active .navbar-link:nth-child(5) {
                animation-delay: 0.3s;
            }

            @keyframes slideIn {
                to {
                    opacity: 1;
                    transform: translateX(0);
                }
            }

            .overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100vh;
                background-color: rgba(0, 0, 0, 0);
                z-index: 999;
                transition: background-color 0.3s ease;
            }

            .overlay.active {
                display: block;
                background-color: rgba(0, 0, 0, 0.5);
            }
        }
    </style>
</head>
<body>
    <div class="overlay" id="overlay"></div>
    <nav class="navbar">
        <a href="{{ url_for('index') }}" class="navbar-logo">
            <img src="{{ url_for('static', filename='assets/twcom.png') }}" alt="Logo">
        </a>
        <button class="hamburger" id="hamburger" aria-label="Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="navbar-links" id="navbarLinks">
            <a href="{{ url_for('index') }}" class="navbar-link">Home</a>
            <a href="{{ url_for('about') }}" class="navbar-link">About Me</a>
            <a href="{{ url_for('projects') }}" class="navbar-link">Projects</a>
            <a href="{{ url_for('blender') }}" class="navbar-link">Blender</a>
            <a href="{{ url_for('blogs') }}" class="navbar-link">Blogs</a>
            <a href="{{ url_for('officialresume') }}" class="navbar-link">Resume</a>
            <!-- Dynamic Login/Profile button with dropdown -->
            <div style="position:relative;display:inline-block;">
                <a href="/login" class="navbar-link" id="loginProfileBtn" style="display:none"></a>
                <div id="profileDropdown" class="profile-dropdown" style="display:none;position:absolute;top:100%;right:0;min-width:140px;background:#fff;border:1px solid #d6eaff;border-radius:8px;box-shadow:0 2px 8px rgba(0,85,170,0.07);z-index:2000;">
                    <a href="/profile" class="dropdown-item" style="display:block;padding:10px 18px;color:#004080;text-decoration:none;">Profile</a>
                    <button id="logoutBtn" class="dropdown-item" style="display:block;width:100%;text-align:left;padding:10px 18px;background:none;border:none;color:#d9534f;cursor:pointer;">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <script>
    // API_URL is injected by Flask into the template context
    if (typeof API_URL === 'undefined') {
        var API_URL = "{{ API_URL if API_URL is defined else '' }}";
    }
        const hamburger = document.getElementById('hamburger');
        const navbarLinks = document.getElementById('navbarLinks');
        const overlay = document.getElementById('overlay');
        const links = document.querySelectorAll('.navbar-link');

        // Dynamic Login/Profile button logic
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }
        function updateLoginProfileBtn() {
            const btn = document.getElementById('loginProfileBtn');
            const dropdown = document.getElementById('profileDropdown');
            const loggedIn = getCookie('loggedIn');
            if (loggedIn === 'true') {
                btn.textContent = 'Profile';
                btn.href = '#';
                btn.setAttribute('aria-haspopup', 'true');
                btn.setAttribute('aria-expanded', 'false');
                btn.style.display = 'inline-block';
                dropdown.style.display = 'none';
                dropdown.style.visibility = 'visible';
            } else {
                btn.textContent = 'Login';
                btn.href = '/login';
                btn.removeAttribute('aria-haspopup');
                btn.removeAttribute('aria-expanded');
                btn.style.display = 'inline-block';
                dropdown.style.display = 'none';
                dropdown.style.visibility = 'hidden';
            }
        }
        document.addEventListener('DOMContentLoaded', updateLoginProfileBtn);

        // Dropdown logic
        const btn = document.getElementById('loginProfileBtn');
        const dropdown = document.getElementById('profileDropdown');
        let dropdownOpen = false;
        function showDropdown() {
            dropdown.style.display = 'block';
            btn.setAttribute('aria-expanded', 'true');
            dropdownOpen = true;
        }
        function hideDropdown() {
            dropdown.style.display = 'none';
            btn.setAttribute('aria-expanded', 'false');
            dropdownOpen = false;
        }
        btn.addEventListener('click', function(e) {
            if (btn.textContent === 'Profile') {
                e.preventDefault();
                if (dropdownOpen) {
                    hideDropdown();
                } else {
                    showDropdown();
                }
            } else if (btn.textContent === 'Login') {
                // Go to login page
                window.location.href = '/login';
            }
        });
        // Show dropdown on mouse enter, hide on mouse leave (only if logged in)
        btn.addEventListener('mouseenter', function(e) {
            if (btn.textContent === 'Profile') showDropdown();
        });
        btn.addEventListener('mouseleave', function(e) {
            setTimeout(() => {
                if (btn.textContent === 'Profile' && !dropdown.matches(':hover') && !btn.matches(':hover')) {
                    hideDropdown();
                }
            }, 120);
        });
        dropdown.addEventListener('mouseenter', function(e) {
            if (btn.textContent === 'Profile') showDropdown();
        });
        dropdown.addEventListener('mouseleave', function(e) {
            if (btn.textContent === 'Profile') hideDropdown();
        });

                // Hide dropdown on click outside
                document.addEventListener('click', function(e) {
                    if (!btn.contains(e.target) && !dropdown.contains(e.target)) {
                        hideDropdown();
                    }
                });

                // Hide dropdown on nav link click (mobile)

        Array.from(document.getElementsByClassName('navbar-link')).forEach(link => {
            link.addEventListener('click', hideDropdown);
        });

        // Logout logic
        document.getElementById('logoutBtn').addEventListener('click', async function(e) {
            e.preventDefault();
            try {
                await fetch(`${API_URL}/logout`, { method: 'POST', credentials: 'include' });
            } catch {}
            // Remove loggedIn cookie immediately for UI
            document.cookie = 'loggedIn=false; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT';
            updateLoginProfileBtn();
            hideDropdown();
        });

        function toggleMenu() {
            hamburger.classList.toggle('active');
            navbarLinks.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        hamburger.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);

        links.forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth <= 600) {
                    toggleMenu();
                }
            });
        });

        // Close menu on window resize if open
        window.addEventListener('resize', () => {
            if (window.innerWidth > 600 && navbarLinks.classList.contains('active')) {
                toggleMenu();
            }
        });
    </script>
</body>
</html>
